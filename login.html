<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — NIS Alumni</title>
    <meta name="description" content="Sign in to your NIS Alumni account." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] },
                    colors: {
                        navy: { DEFAULT: '#0B1D3A', light: '#15325E' },
                        accent: { DEFAULT: '#C8FF00', soft: '#D4FF4D' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/custom.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="font-body bg-gray-50 min-h-screen flex">

    <!-- Left: branding panel (hidden on mobile) -->
    <div class="hidden lg:flex lg:w-1/2 gradient-animated items-center justify-center p-12 relative overflow-hidden">
        <div class="absolute inset-0 pointer-events-none"
            style="background-image: radial-gradient(rgba(255,255,255,.03) 1px, transparent 1px); background-size: 40px 40px;">
        </div>
        <div class="relative z-10 text-center max-w-md">
            <div class="w-16 h-16 bg-accent rounded-full flex items-center justify-center mx-auto mb-8">
                <span class="font-display font-900 text-navy text-2xl">N</span>
            </div>
            <h1 class="font-display font-900 text-4xl text-white tracking-tight mb-4">Welcome back</h1>
            <p class="text-white/50 text-lg">Sign in to reconnect with your NIS community around the world.</p>
        </div>
    </div>

    <!-- Right: login form -->
    <div class="flex-1 flex items-center justify-center p-8">
        <div class="w-full max-w-md animate-fade-in-up">

            <!-- Mobile logo -->
            <div class="lg:hidden flex items-center gap-2 mb-8">
                <div class="w-10 h-10 bg-accent rounded-full flex items-center justify-center">
                    <span class="font-display font-900 text-navy text-lg">N</span>
                </div>
                <span class="font-display font-bold text-xl text-navy">NIS Alumni</span>
            </div>

            <h2 class="font-display font-800 text-3xl text-navy mb-2">Sign in</h2>
            <p class="text-gray-400 mb-8">Enter your credentials to access your account.</p>

            <form id="login-form" class="space-y-5">
                <div>
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" required autocomplete="email" class="form-input"
                        placeholder="you@example.com" />
                </div>

                <div>
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        class="form-input" placeholder="••••••••" />
                </div>

                <button type="submit" class="btn-primary w-full justify-center text-base !py-4">
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    Sign In
                </button>
            </form>

            <p class="text-center text-gray-400 text-sm mt-8">
                Don't have an account?
                <a href="register.html" class="text-navy font-semibold hover:underline">Sign up</a>
            </p>

            <a href="index.html"
                class="flex items-center justify-center gap-1 text-gray-400 text-sm mt-4 hover:text-navy transition">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to home
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>

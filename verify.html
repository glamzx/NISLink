<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verified – NISLink</title>
    <meta name="description" content="Your email has been successfully verified. Sign in to NISLink." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0B1D3A',
                        'navy-light': '#132C56',
                        accent: '#C8FF00',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                    },
                },
            },
        };
    </script>
    <style>
        .success-glow {
            box-shadow: 0 0 40px rgba(200,255,0,0.15), 0 0 80px rgba(200,255,0,0.05);
        }
        @keyframes checkBounce {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .check-animate {
            animation: checkBounce 0.6s ease-out 0.3s both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.5s ease-out 0.6s both; }
        .fade-up-2 { animation: fadeUp 0.5s ease-out 0.8s both; }
        .fade-up-3 { animation: fadeUp 0.5s ease-out 1s both; }
    </style>
</head>
<body class="bg-navy min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-3xl p-10 shadow-2xl success-glow text-center">
            <!-- Success Check -->
            <div class="w-20 h-20 bg-accent rounded-full flex items-center justify-center mx-auto mb-6 check-animate">
                <svg class="w-10 h-10 text-navy" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>

            <!-- Title -->
            <h1 class="font-display text-3xl font-bold text-navy mb-3 fade-up">
                Verified!
            </h1>
            <p class="text-gray-500 text-sm leading-relaxed mb-8 fade-up-2">
                Your email has been successfully verified.<br />
                You can now sign in and start connecting with the NIS community.
            </p>

            <!-- Sign In Button -->
            <a href="index.html"
                class="inline-flex items-center justify-center w-full px-8 py-3.5 bg-navy text-white font-semibold rounded-full hover:bg-navy-light transition text-sm fade-up-3">
                Sign In →
            </a>

            <!-- Logo -->
            <div class="mt-8 fade-up-3">
                <p class="text-xs text-gray-300">Powered by</p>
                <p class="font-display text-lg font-bold text-navy mt-1">NIS<span class="text-accent">Link</span></p>
            </div>
        </div>
    </div>
</body>
</html>

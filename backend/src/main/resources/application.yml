server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: false          # Set to true in production (HTTPS required)
        same-site: strict
        name: NISCONNECT_SESSION
        max-age: 86400         # 24 hours
        path: /

# ── MySQL Datasource (MAMP defaults) ──────────────────────
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:8889/nis_alumni?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000           # 30 min — prevents MySQL wait_timeout disconnects
      leak-detection-threshold: 30000 # Log warning if connection held > 30s
      validation-timeout: 5000        # Connection validation timeout
      pool-name: NISConnect-HikariPool

  jpa:
    hibernate:
      ddl-auto: update         # Auto-create read_at/edited_at columns
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Spring Session stored in DB (optional, use 'none' for in-memory)
  session:
    store-type: none

# ── Async Thread Pool for DB Writes ───────────────────────
app:
  async:
    core-pool-size: 4
    max-pool-size: 10
    queue-capacity: 500
    thread-name-prefix: chat-db-

  # CORS — allowed frontend origins
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:5500
      - https://nisconnect.me
      - https://glamzx.github.io

  # WebSocket
  websocket:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:5500
      - https://nisconnect.me
      - https://glamzx.github.io

logging:
  level:
    com.nisconnect: DEBUG
    org.springframework.web.socket: INFO
    com.zaxxer.hikari: INFO

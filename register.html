<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — NISLink</title>
    <meta name="description" content="Create your NISLink account and join the community." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] },
                    colors: {
                        navy: { DEFAULT: '#0B1D3A', light: '#15325E' },
                        accent: { DEFAULT: '#C8FF00', soft: '#D4FF4D' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/custom.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="font-body bg-gray-50 min-h-screen flex">

    <!-- Left: branding panel -->
    <div class="hidden lg:flex lg:w-1/2 gradient-animated items-center justify-center p-12 relative overflow-hidden">
        <div class="absolute inset-0 pointer-events-none"
            style="background-image: radial-gradient(rgba(255,255,255,.03) 1px, transparent 1px); background-size: 40px 40px;">
        </div>
        <div class="relative z-10 text-center max-w-md">
            <div class="w-16 h-16 bg-accent rounded-full flex items-center justify-center mx-auto mb-8">
                <span class="font-display font-900 text-navy text-2xl">N</span>
            </div>
            <h1 class="font-display font-900 text-4xl text-white tracking-tight mb-4">Join the network</h1>
            <p class="text-white/50 text-lg">Create your profile and find NIS alumni across the globe.</p>
        </div>
    </div>

    <!-- Right: registration form -->
    <div class="flex-1 flex items-center justify-center p-8 overflow-y-auto">
        <div class="w-full max-w-md animate-fade-in-up py-8">

            <div class="lg:hidden flex items-center gap-2 mb-8">
                <div class="w-10 h-10 bg-accent rounded-full flex items-center justify-center">
                    <span class="font-display font-900 text-navy text-lg">N</span>
                </div>
                <span class="font-display font-bold text-xl text-navy">NISLink</span>
            </div>

            <h2 class="font-display font-800 text-3xl text-navy mb-2">Create account</h2>
            <p class="text-gray-400 mb-8">Fill in your details to get started.</p>

            <form id="register-form" class="space-y-5">
                <div>
                    <label for="full_name" class="form-label">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required class="form-input"
                        placeholder="Aisha Nazarbayeva" />
                </div>

                <div>
                    <label for="username" class="form-label">Username</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-semibold">@</span>
                        <input type="text" id="username" name="username" required class="form-input !pl-9"
                            placeholder="your_handle" pattern="[a-zA-Z0-9_]{3,30}" minlength="3" maxlength="30" />
                        <span id="username-status"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-sm hidden"></span>
                    </div>
                    <p id="username-hint" class="text-xs text-gray-400 mt-1">3-30 characters, letters, numbers,
                        underscores</p>
                </div>

                <div>
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" required autocomplete="email" class="form-input"
                        placeholder="you@example.com" />
                </div>

                <div>
                    <label class="form-label">I am a</label>
                    <div class="flex gap-2">
                        <button type="button" id="type-student" onclick="setUserType('student')"
                            class="flex-1 py-2.5 rounded-full text-sm font-semibold transition bg-navy text-white">
                            🎓 Student
                        </button>
                        <button type="button" id="type-alumni" onclick="setUserType('alumni')"
                            class="flex-1 py-2.5 rounded-full text-sm font-semibold transition bg-gray-100 text-gray-600 hover:bg-gray-200">
                            🏛️ Alumni
                        </button>
                    </div>
                    <input type="hidden" id="user_type" name="user_type" value="student" />
                </div>

                <div id="alumni-fields" class="hidden space-y-4">
                    <div>
                        <label for="university" class="form-label">University</label>
                        <input type="text" id="university" name="university" class="form-input"
                            placeholder="e.g. Nazarbayev University" />
                    </div>
                    <div>
                        <label for="uni_graduation_year" class="form-label">University Graduation Year</label>
                        <select id="uni_graduation_year" name="uni_graduation_year" class="form-input">
                            <option value="" disabled selected>Year</option>
                            <script>
                                for (let y = 2035; y >= 2012; y--) {
                                    const opt = document.createElement('option');
                                    opt.value = y; opt.textContent = y;
                                    document.getElementById('uni_graduation_year').appendChild(opt);
                                }
                            </script>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="nis_branch" class="form-label">NIS Branch</label>
                        <select id="nis_branch" name="nis_branch" class="form-input" required>
                            <option value="" disabled selected>Select school</option>
                            <option value="NIS IB Astana">NIS IB Astana</option>
                            <option value="NIS Astana-Nura">NIS Astana-Nura</option>
                            <option value="NIS Almaty-Medeu">NIS Almaty-Medeu</option>
                            <option value="NIS Almaty-Nauryzbay">NIS Almaty-Nauryzbay</option>
                            <option value="NIS Shymkent-Abay">NIS Shymkent-Abay</option>
                            <option value="NIS Shymkent-Karatau">NIS Shymkent-Karatau</option>
                            <option value="NIS Aktau">NIS Aktau</option>
                            <option value="NIS Aktobe">NIS Aktobe</option>
                            <option value="NIS Atyrau">NIS Atyrau</option>
                            <option value="NIS Karaganda">NIS Karaganda</option>
                            <option value="NIS Kokshetau">NIS Kokshetau</option>
                            <option value="NIS Kostanay">NIS Kostanay</option>
                            <option value="NIS Kyzylorda">NIS Kyzylorda</option>
                            <option value="NIS Pavlodar">NIS Pavlodar</option>
                            <option value="NIS Petropavl">NIS Petropavl</option>
                            <option value="NIS Semey">NIS Semey</option>
                            <option value="NIS Taldykorgan">NIS Taldykorgan</option>
                            <option value="NIS Taraz">NIS Taraz</option>
                            <option value="NIS Turkestan">NIS Turkestan</option>
                            <option value="NIS Oral">NIS Oral</option>
                            <option value="NIS Oskemen">NIS Oskemen</option>
                        </select>
                    </div>
                    <div>
                        <label for="graduation_year" class="form-label">Grad Year</label>
                        <select id="graduation_year" name="graduation_year" class="form-input">
                            <option value="" disabled selected>Year</option>
                            <script>
                                for (let y = 2035; y >= 2008; y--) {
                                    const opt = document.createElement('option');
                                    opt.value = y; opt.textContent = y;
                                    document.getElementById('graduation_year').appendChild(opt);
                                }
                            </script>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="birthday" class="form-label">Birthday</label>
                    <input type="date" id="birthday" name="birthday" class="form-input" />
                </div>

                <div>
                    <label for="gender" class="form-label">Gender</label>
                    <select id="gender" name="gender" class="form-input">
                        <option value="" disabled selected>Select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="prefer_not_to_say">Prefer not to say</option>
                    </select>
                </div>

                <div>
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" class="form-input"
                        placeholder="Min. 6 characters" />
                </div>

                <div>
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required class="form-input"
                        placeholder="••••••••" />
                </div>

                <button type="submit" class="btn-primary w-full justify-center text-base !py-4">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    Create Account
                </button>
            </form>

            <p class="text-center text-gray-400 text-sm mt-8">
                Already have an account?
                <a href="login.html" class="text-navy font-semibold hover:underline">Sign in</a>
            </p>

            <a href="index.html"
                class="flex items-center justify-center gap-1 text-gray-400 text-sm mt-4 hover:text-navy transition">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to home
            </a>
        </div>
    </div>

    <script src="js/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        function setUserType(type) {
            document.getElementById('user_type').value = type;
            const studentBtn = document.getElementById('type-student');
            const alumniBtn = document.getElementById('type-alumni');
            const alumniFields = document.getElementById('alumni-fields');
            if (type === 'alumni') {
                alumniBtn.className = 'flex-1 py-2.5 rounded-full text-sm font-semibold transition bg-navy text-white';
                studentBtn.className = 'flex-1 py-2.5 rounded-full text-sm font-semibold transition bg-gray-100 text-gray-600 hover:bg-gray-200';
                alumniFields.classList.remove('hidden');
            } else {
                studentBtn.className = 'flex-1 py-2.5 rounded-full text-sm font-semibold transition bg-navy text-white';
                alumniBtn.className = 'flex-1 py-2.5 rounded-full text-sm font-semibold transition bg-gray-100 text-gray-600 hover:bg-gray-200';
                alumniFields.classList.add('hidden');
            }
        }
    </script>
    <script src="js/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
